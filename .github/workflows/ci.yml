name: CI

on:
  push:
    branches: [ main, v2.0 ]
  pull_request:
    branches: [ main, v2.0 ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore TaskbarAudioSwitcher.csproj

      - name: Build
        run: dotnet build TaskbarAudioSwitcher.csproj -c Release --no-restore
